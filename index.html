document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

erif; font-size:13px; letter-spacing:.42em; color:#b89a52; text-transform:uppercase; margin-top:34px;\">Высокая коллегия стулостояния представляет<\u002Fdiv>\n    <h1 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(52px,10.5vw,138px); line-height:.92; letter-spacing:-.01em; margin-top:10px; color:#fbf3df; text-shadow:0 6px 40px rgba(230,194,102,0.28);\">ВЕЛИКОЕ<br>СИДЕНИЕ<\u002Fh1>\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:16px; margin-top:20px;\">\n      <span style=\"width:54px; height:1px; background:linear-gradient(90deg,transparent,#b89a52);\"><\u002Fspan>\n      <span style=\"font-family:'Marck Script', cursive; font-size:clamp(26px,5vw,42px); color:#e6c266;\">итоги месяца у стены<\u002Fspan>\n      <span style=\"width:54px; height:1px; background:linear-gradient(90deg,#b89a52,transparent);\"><\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"max-width:560px; margin:22px auto 0; color:#c3b79c; font-size:17px;\">Один месяц у стены, секундомер в кадре и 22 пары трясущихся ног. Это летопись тех, кто сидел до конца — и тех, кто пытался.<\u002Fp>\n\n    <div class=\"cd-g4\" style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:46px;\">\n      <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n        <div style=\"position:relative; background:linear-gradient(180deg, rgba(44,16,25,0.7), rgba(20,10,16,0.6)); border:1px solid rgba(230,194,102,0.18); border-radius:18px; padding:22px 12px; overflow:hidden;\">\n          <div class=\"kpi-num\" data-cu=\"{{ k.target }}\" data-suffix=\"{{ k.suffix }}\" data-static=\"{{ k.static }}\" style=\"font-family:'Prata', serif; font-size:clamp(28px,5vw,46px); color:#e6c266; line-height:1;\">{{ k.initial }}<\u002Fdiv>\n          <div style=\"color:#b3a488; font-size:12px; margin-top:8px; text-transform:uppercase; letter-spacing:.08em;\">{{ k.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:54px; display:flex; flex-direction:column; align-items:center; gap:8px; color:#8c7f6a;\">\n      <span style=\"font-size:11px; letter-spacing:.2em; text-transform:uppercase;\">листай вниз<\u002Fspan>\n      <span style=\"font-size:20px; animation:scrollNudge 1.8s ease-in-out infinite;\">▾<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ ПЬЕДЕСТАЛ ============ -->\n  <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:70px 22px 20px;\">\n    <div data-reveal=\"\" style=\"text-align:center;\">\n      <div style=\"font-family:'Prata', serif; font-size:13px; letter-spacing:.34em; color:#b89a52; text-transform:uppercase;\">Пьедестал почёта<\u002Fdiv>\n      <h2 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(34px,5.5vw,58px); color:#fbf3df; margin-top:8px;\">Те, кто сидел до конца<\u002Fh2>\n      <p style=\"color:#bdb094; max-width:560px; margin:12px auto 0;\">Пятеро прошли все 30 дней без единого пропуска. Трое из них — на вершине, по суммарному времени у стены.<\u002Fp>\n    <\u002Fdiv>\n\n    <div id=\"cd-podium\" class=\"cd-podium\" style=\"display:grid; grid-template-columns:1fr 1.18fr 1fr; align-items:end; gap:18px; margin-top:54px;\">\n      <sc-for list=\"{{ podium }}\" as=\"m\" hint-placeholder-count=\"3\">\n        <div data-podium=\"{{ m.place }}\" data-cert=\"{{ m.certIdx }}\" style=\"cursor:pointer; opacity:0;\">\n          <div style=\"position:relative; background:linear-gradient(180deg,#3a1622,#1c0e16); border:1px solid rgba(230,194,102,0.45); border-radius:20px 20px 0 0; padding:26px 16px 22px; text-align:center; overflow:hidden; box-shadow:0 -2px 40px rgba(230,194,102,0.14);\">\n            <div style=\"position:absolute; inset:0 0 auto 0; height:4px; background:linear-gradient(90deg,#b88a36,#f6e6a8,#b88a36);\"><\u002Fdiv>\n            <div style=\"position:absolute; top:0; left:0; width:60%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.16),transparent); transform:translateX(-130%) skewX(-20deg); animation:shimmerSweep 4.5s ease-in-out infinite; animation-delay:{{ m.shimmerDelay }};\"><\u002Fdiv>\n            <div data-icon=\"medal\" data-place=\"{{ m.place }}\" style=\"height:70px; display:flex; align-items:center; justify-content:center;\"><\u002Fdiv>\n            <div style=\"font-family:'Prata', serif; font-size:22px; color:#fbf3df; margin-top:12px;\">{{ m.name }}<\u002Fdiv>\n            <div style=\"display:inline-block; margin-top:8px; font-size:11px; font-weight:700; letter-spacing:.05em; color:#1a0910; background:#b6f05c; padding:3px 11px; border-radius:12px;\">30 / 30 ДНЕЙ<\u002Fdiv>\n            <div style=\"color:#cdbf9f; font-size:13.5px; margin-top:12px;\">суммарно <b style=\"color:#e6c266;\">{{ m.total }}<\u002Fb><\u002Fdiv>\n            <div style=\"color:#9d927b; font-size:12.5px; margin-top:2px;\">рекорд дня {{ m.max }}<\u002Fdiv>\n            <div style=\"margin-top:14px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#e6c266; opacity:.8;\">открыть сертификат →<\u002Fdiv>\n          <\u002Fdiv>\n          <div data-step=\"{{ m.place }}\" style=\"height:{{ m.stepH }}; background:linear-gradient(180deg,#241019,#160a10); border:1px solid rgba(230,194,102,0.25); border-top:none; display:flex; align-items:center; justify-content:center; font-family:'Prata', serif; font-size:40px; color:rgba(230,194,102,0.5);\">{{ m.rankRoman }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:flex; align-items:center; justify-content:center; gap:14px; margin-top:30px; flex-wrap:wrap;\">\n      <span style=\"font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:#9d927b;\">железный клуб 30/30:<\u002Fspan>\n      <sc-for list=\"{{ ironClub }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <span style=\"display:inline-flex; align-items:center; gap:7px; padding:6px 13px; border:1px solid rgba(230,194,102,0.3); border-radius:30px; font-size:13.5px; color:#e8dcc2;\"><span style=\"color:#b6f05c;\">●<\u002Fspan>{{ c }}<\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ДОСТОЯВШИЕ — сетка дипломов ============ -->\n  <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:80px 22px 20px;\">\n    <div data-reveal=\"\" style=\"text-align:center;\">\n      <div style=\"font-family:'Prata', serif; font-size:13px; letter-spacing:.34em; color:#b89a52; text-transform:uppercase;\">Орденоносцы<\u002Fdiv>\n      <h2 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(34px,5.5vw,58px); color:#fbf3df; margin-top:8px;\">Зал достоявших<\u002Fh2>\n      <p style=\"color:#bdb094; max-width:600px; margin:12px auto 0;\">Десять героев, что явили финальное видео и снискали право именоваться Достоявшими. Нажми на карточку — сертификат развернётся во всей красе. Его можно скачать.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px; margin-top:46px;\">\n      <sc-for list=\"{{ dostCards }}\" as=\"c\" hint-placeholder-count=\"10\">\n        <div data-reveal=\"\" data-cert=\"{{ c.idx }}\" style=\"position:relative; cursor:pointer; background:{{ c.cardBg }}; border:1px solid {{ c.cardBorder }}; border-radius:18px; padding:20px; overflow:hidden; transition:transform .25s ease, box-shadow .25s ease;\" style-hover=\"transform:translateY(-6px); box-shadow:0 16px 40px rgba(0,0,0,0.5);\">\n          <div style=\"position:absolute; inset:0 0 auto 0; height:3px; background:{{ c.accent }};\"><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <div style=\"font-family:'Prata', serif; font-size:34px; color:{{ c.accentText }}; line-height:1;\">{{ c.rankRoman }}<\u002Fdiv>\n            <div style=\"text-align:right; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#a99c82;\">{{ c.tierLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Prata', serif; font-size:20px; color:#fbf3df; margin-top:14px; line-height:1.2;\">{{ c.name }}<\u002Fdiv>\n          <div style=\"font-style:italic; color:#c9bc9f; font-size:13px; margin-top:8px; min-height:34px;\">«{{ c.nomination }}»<\u002Fdiv>\n          <div style=\"display:flex; gap:16px; margin-top:14px; padding-top:14px; border-top:1px solid rgba(230,194,102,0.14);\">\n            <div><div style=\"font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#9d927b;\">дней<\u002Fdiv><div style=\"font-family:'Prata', serif; font-size:18px; color:#e6c266;\">{{ c.days }}/30<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#9d927b;\">суммарно<\u002Fdiv><div style=\"font-family:'Prata', serif; font-size:18px; color:#e6c266;\">{{ c.total }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:{{ c.accentText }}; opacity:.85;\">развернуть сертификат →<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- усидчивость без достоявшего -->\n    <div data-reveal=\"\" style=\"text-align:center; margin-top:64px;\">\n      <h3 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(24px,3.6vw,34px); color:#e8dcc2;\">Орден усидчивости — без звания Достоявшего<\u002Fh3>\n      <p style=\"color:#a99c82; max-width:560px; margin:10px auto 0; font-size:14.5px;\">Прошли больше половины, но финального видео в решающий день так и не явили. Усидчивость зачтена, звание — нет.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,360px)); gap:16px; justify-content:center; margin-top:24px;\">\n      <sc-for list=\"{{ usidOnly }}\" as=\"c\" hint-placeholder-count=\"2\">\n        <div data-reveal=\"\" data-cert=\"{{ c.idx }}\" style=\"position:relative; cursor:pointer; background:linear-gradient(180deg,rgba(36,20,16,0.7),rgba(20,12,14,0.7)); border:1px dashed rgba(176,138,62,0.5); border-radius:18px; padding:20px; transition:transform .25s ease;\" style-hover=\"transform:translateY(-6px);\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n            <div style=\"font-family:'Prata', serif; font-size:20px; color:#e8dcc2;\">{{ c.name }}<\u002Fdiv>\n            <div style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#a99c82;\">II степень<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-style:italic; color:#c9bc9f; font-size:13px; margin-top:8px;\">«{{ c.nomination }}»<\u002Fdiv>\n          <div style=\"display:flex; gap:16px; margin-top:14px; padding-top:14px; border-top:1px solid rgba(176,138,62,0.2);\">\n            <div><div style=\"font-size:10px; text-transform:uppercase; color:#9d927b;\">дней<\u002Fdiv><div style=\"font-family:'Prata', serif; font-size:18px; color:#cBA15a;\">{{ c.days }}/30<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10px; text-transform:uppercase; color:#9d927b;\">суммарно<\u002Fdiv><div style=\"font-family:'Prata', serif; font-size:18px; color:#cBA15a;\">{{ c.total }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#cBA15a; opacity:.8;\">развернуть сертификат →<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- особое отличие — Сергей Медведев (отцовство) -->\n    <div data-reveal=\"\" data-cert=\"father\" style=\"cursor:pointer; max-width:760px; margin:48px auto 0; position:relative; background:linear-gradient(135deg,rgba(231,150,180,0.16),rgba(120,40,70,0.22)); border:1px solid rgba(231,150,180,0.5); border-radius:20px; padding:24px 26px; display:flex; align-items:center; gap:22px; flex-wrap:wrap; overflow:hidden; transition:transform .25s ease;\" style-hover=\"transform:translateY(-6px);\">\n      <div style=\"position:absolute; inset:0 0 auto 0; height:3px; background:linear-gradient(90deg,#c2557a,#f7c9da,#c2557a);\"><\u002Fdiv>\n      <div data-icon=\"baby\" style=\"width:62px; height:62px; flex:none; filter:drop-shadow(0 4px 10px rgba(120,40,70,0.4));\"><\u002Fdiv>\n      <div style=\"flex:1; min-width:240px;\">\n        <div style=\"font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#f0a8c2; font-weight:700;\">Особое отличие · вне зачёта<\u002Fdiv>\n        <div style=\"font-family:'Prata', serif; font-size:24px; color:#ffe3ee; margin-top:6px;\">Орден отцовской усидчивости<\u002Fdiv>\n        <div style=\"color:#e9c2d2; font-size:14px; margin-top:6px;\">Сергей вступил в челлендж уже отцом новорождённого — и между бессонными ночами честно отсидел у стены 10 раз на 19:15. На большее сил не осталось, и это абсолютно понятно. Сама попытка достойна ордена.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#f0a8c2;\">развернуть →<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- диплом участника -->\n    <div data-reveal=\"\" data-cert=\"diploma\" style=\"cursor:pointer; max-width:760px; margin:20px auto 0; background:#1a1714; border:1px dashed #4a463d; border-radius:16px; padding:22px 24px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; justify-content:center; text-align:center;\">\n      <div data-icon=\"meh\" style=\"width:48px; height:48px; flex:none; opacity:.85;\"><\u002Fdiv>\n      <div style=\"flex:1; min-width:220px; text-align:left;\">\n        <div style=\"font-family:'Special Elite', monospace; font-size:18px; color:#b8ad98;\">Диплом участника — один на всех<\u002Fdiv>\n        <div style=\"color:#8c8273; font-size:13.5px; margin-top:4px;\">Для всех, кто не дотянул и до половины. Все вписаны поимённо — внутри нужно лишь подчеркнуть своё имя. Тоже можно скачать на холодильник.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#9a8f7a;\">открыть →<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ НОМИНАЦИИ ============ -->\n  <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:80px 22px 20px;\">\n    <div data-reveal=\"\" style=\"text-align:center;\">\n      <div style=\"font-family:'Prata', serif; font-size:13px; letter-spacing:.34em; color:#b89a52; text-transform:uppercase;\">Высочайшие отличия<\u002Fdiv>\n      <h2 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(34px,5.5vw,58px); color:#fbf3df; margin-top:8px;\">Особые номинации<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cd-g3\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:46px;\">\n      <sc-for list=\"{{ awards }}\" as=\"a\" hint-placeholder-count=\"3\">\n        <div data-reveal=\"\" style=\"position:relative; background:linear-gradient(180deg,rgba(44,16,25,0.6),rgba(20,10,16,0.55)); border:1px solid rgba(230,194,102,0.22); border-radius:20px; padding:26px 22px; overflow:hidden;\">\n          <div data-icon=\"{{ a.icon }}\" data-ghost=\"1\" style=\"position:absolute; top:-26px; right:-18px; width:130px; height:130px; opacity:.06;\"><\u002Fdiv>\n          <div data-icon=\"{{ a.icon }}\" style=\"width:48px; height:48px; animation:floatY 4s ease-in-out infinite;\"><\u002Fdiv>\n          <div style=\"font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#e6c266; font-weight:700; margin-top:14px;\">{{ a.title }}<\u002Fdiv>\n          <div style=\"font-family:'Prata', serif; font-size:26px; color:#fbf3df; margin-top:4px;\">{{ a.name }}<\u002Fdiv>\n          <div style=\"display:inline-block; font-family:'Prata', serif; font-size:20px; color:#b6f05c; margin-top:6px;\">{{ a.val }}<\u002Fdiv>\n          <div style=\"color:#bdb094; font-size:13.5px; margin-top:12px;\">{{ a.desc }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ИНФОГРАФИКА: HEATMAP ============ -->\n  <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:80px 22px 20px;\">\n    <div data-reveal=\"\" style=\"text-align:center; margin-bottom:30px;\">\n      <div style=\"font-family:'Prata', serif; font-size:13px; letter-spacing:.34em; color:#b89a52; text-transform:uppercase;\">Хроника усидчивости<\u002Fdiv>\n      <h2 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(30px,5vw,52px); color:#fbf3df; margin-top:8px;\">Карта месяца<\u002Fh2>\n      <p style=\"color:#bdb094; max-width:560px; margin:12px auto 0;\">Кто в какой день садился к стене — и насколько выложился. Наведи на клетку.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"background:rgba(20,12,16,0.6); border:1px solid rgba(230,194,102,0.16); border-radius:20px; padding:18px 16px; overflow-x:auto;\">\n      <div id=\"cd-heatmap\" style=\"display:grid; gap:3px; min-width:860px;\"><\u002Fdiv>\n      <div style=\"display:flex; gap:18px; flex-wrap:wrap; margin-top:16px; font-size:12.5px; color:#a99c82; align-items:center;\">\n        <span><span style=\"display:inline-block; width:13px; height:13px; border-radius:3px; background:#7fd13b; vertical-align:-2px; margin-right:6px;\"><\u002Fspan>норма дня выполнена<\u002Fspan>\n        <span><span style=\"display:inline-block; width:13px; height:13px; border-radius:3px; background:#caa53e; vertical-align:-2px; margin-right:6px;\"><\u002Fspan>сел, но ниже цели<\u002Fspan>\n        <span><span style=\"display:inline-block; width:13px; height:13px; border-radius:3px; background:#241a22; vertical-align:-2px; margin-right:6px;\"><\u002Fspan>пропуск<\u002Fspan>\n        <span style=\"margin-left:auto;\">наведи на клетку — покажет время<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ИНФОГРАФИКА: КРИВАЯ ВЫЖИВАНИЯ ============ -->\n  <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:60px 22px 20px;\">\n    <div data-reveal=\"\" style=\"text-align:center; margin-bottom:30px;\">\n      <div style=\"font-family:'Prata', serif; font-size:13px; letter-spacing:.34em; color:#b89a52; text-transform:uppercase;\">Естественный отбор<\u002Fdiv>\n      <h2 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(30px,5vw,52px); color:#fbf3df; margin-top:8px;\">Кривая выживаемости<\u002Fh2>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"background:rgba(20,12,16,0.6); border:1px solid rgba(230,194,102,0.16); border-radius:20px; padding:24px;\">\n      <div id=\"cd-survival\"><\u002Fdiv>\n      <p style=\"color:#bdb094; font-size:14px; margin-top:14px;\">Старт — <b style=\"color:#f2e9d6;\">20 человек<\u002Fb>, пик на 3-й день — <b style=\"color:#f2e9d6;\">21<\u002Fb>. К середине осталась крепкая дюжина, в самом провале (день 19) до стены дошли только <b style=\"color:#ff6b6b;\">8<\u002Fb>. А на финал народ подтянулся обратно — <b style=\"color:#b6f05c;\">10<\u002Fb> в последний день. Классика: тяжелее всего не в конце, а в середине.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ФАКТЫ ============ -->\n  <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:70px 22px 20px;\">\n    <div data-reveal=\"\" style=\"text-align:center;\">\n      <div style=\"font-family:'Prata', serif; font-size:13px; letter-spacing:.34em; color:#b89a52; text-transform:uppercase;\">Из недр статистики<\u002Fdiv>\n      <h2 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(30px,5vw,52px); color:#fbf3df; margin-top:8px;\">Цифры, которых вы не ждали<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cd-g3\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:42px;\">\n      <sc-for list=\"{{ facts }}\" as=\"f\" hint-placeholder-count=\"6\">\n        <div data-reveal=\"\" style=\"background:rgba(20,12,16,0.6); border:1px solid rgba(230,194,102,0.16); border-radius:18px; padding:24px;\">\n          <div style=\"font-family:'Prata', serif; font-size:34px; color:#e6c266; line-height:1.1;\">{{ f.big }}<\u002Fdiv>\n          <div style=\"font-weight:700; margin-top:6px; color:#f2e9d6;\">{{ f.label }}<\u002Fdiv>\n          <div style=\"color:#a99c82; font-size:13px; margin-top:6px;\">{{ f.sub }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ЗАЛ СЛАВЫ КАПШЕНОВ ============ -->\n  <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:70px 22px 20px;\">\n    <div data-reveal=\"\" style=\"text-align:center; margin-bottom:34px;\">\n      <div style=\"font-family:'Prata', serif; font-size:13px; letter-spacing:.34em; color:#b89a52; text-transform:uppercase;\">Народное творчество<\u002Fdiv>\n      <h2 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(30px,5vw,52px); color:#fbf3df; margin-top:8px;\">Зал славы капшенов<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cd-caps\" style=\"columns:3; column-gap:16px;\">\n      <sc-for list=\"{{ caps }}\" as=\"c\" hint-placeholder-count=\"12\">\n        <div data-reveal=\"\" style=\"break-inside:avoid; background:rgba(28,16,22,0.6); border:1px solid rgba(182,146,255,0.22); border-left:3px solid #b692ff; border-radius:12px; padding:15px 17px; margin-bottom:16px;\">\n          <div style=\"font-size:14.5px; color:#ece3d2;\">«{{ c.text }}»<\u002Fdiv>\n          <div style=\"color:#a99c82; font-size:12px; margin-top:7px; font-weight:600;\">— {{ c.who }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ХУК ============ -->\n  <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:80px 22px 30px;\">\n    <div data-reveal=\"\" style=\"position:relative; background:linear-gradient(135deg,#3a1622,#1c0e16); border:1px solid rgba(230,194,102,0.4); border-radius:28px; padding:clamp(36px,6vw,72px) 28px; text-align:center; overflow:hidden;\">\n      <div style=\"position:absolute; inset:0; background:repeating-conic-gradient(from 0deg at 50% 0%, rgba(230,194,102,0.06) 0deg 5deg, transparent 5deg 12deg); pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"font-family:'Marck Script', cursive; font-size:clamp(26px,4vw,40px); color:#e6c266;\">Стульчик повержен. Что дальше?<\u002Fdiv>\n        <h2 style=\"font-family:'Prata', serif; font-weight:400; font-size:clamp(34px,6vw,68px); color:#fbf3df; margin-top:10px; line-height:1;\">Следующий вызов<br>уже точит секундомер<\u002Fh2>\n        <p style=\"max-width:560px; margin:20px auto 0; color:#cdbf9f; font-size:16.5px;\">Высокая коллегия объявляет набор в новый поход против собственной лени. Места ограничены силой воли. Спину к стене — и вперёд.<\u002Fp>\n        <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:30px;\">\n          <a href=\"#\" style=\"display:inline-flex; align-items:center; gap:9px; padding:15px 30px; background:#b6f05c; color:#15110a; font-weight:800; font-size:15px; letter-spacing:.02em; border-radius:40px; text-decoration:none; box-shadow:0 8px 30px rgba(182,240,92,0.3);\">Записаться на новый челлендж →<\u002Fa>\n          <a href=\"https://nikitadalian.github.io/PlankChallenge/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:9px; padding:15px 30px; background:transparent; color:#e6c266; font-weight:700; font-size:15px; border:1px solid rgba(230,194,102,0.5); border-radius:40px; text-decoration:none;\">⟵ Прошлый поход: Планка<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"margin-top:26px; font-family:'Prata', serif; font-style:italic; color:#b89a52; font-size:15px;\">«Кто сидит — тот побеждает»<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <footer style=\"text-align:center; color:#7c7263; font-size:13px; margin-top:40px; border-top:1px solid rgba(230,194,102,0.12); padding-top:26px;\">\n      Спину к стене, колени под 90. <b style=\"color:#cdbf9f;\">Тренер вернётся и проверит.<\u002Fb><br>\n      <span style=\"font-size:12px;\">Сделано по логам бота и переписке чата «Спорт 35+» · 380 подходов не соврали · 2026<\u002Fspan>\n    <\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- ============ МОДАЛ СЕРТИФИКАТА ============ -->\n  <div id=\"cd-modal\" style=\"position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; padding:24px; background:rgba(8,5,7,0.86); backdrop-filter:blur(6px);\">\n    <div id=\"cd-modalBurst\" style=\"position:absolute; inset:0; pointer-events:none; overflow:hidden;\"><\u002Fdiv>\n    <button id=\"cd-modalClose\" style=\"position:absolute; top:20px; right:22px; width:46px; height:46px; border-radius:50%; border:1px solid rgba(230,194,102,0.4); background:rgba(20,10,16,0.8); color:#e6c266; font-size:22px; cursor:pointer; z-index:3;\">✕<\u002Fbutton>\n    <div id=\"cd-modalStage\" style=\"position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:18px;\">\n      <div id=\"cd-certHolder\" style=\"transform-origin:center; will-change:transform;\"><\u002Fdiv>\n      <button id=\"cd-downloadBtn\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 28px; background:#e6c266; color:#1a0910; font-weight:800; font-size:14.5px; border:none; border-radius:40px; cursor:pointer; box-shadow:0 8px 30px rgba(230,194,102,0.3);\">⬇ Скачать сертификат (PNG)<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <canvas id=\"cd-confetti\" style=\"position:fixed; inset:0; z-index:55; pointer-events:none; display:none;\"><\u002Fcanvas>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  get refs(){ return new Proxy({}, { get:(_,k)=>document.getElementById(\"cd-\"+k) }); }\n  toRoman(n){ co rid-template-columns:140px repeat(30,1fr) 70px;\";\n    let hdr=`<div style=\"display:grid; ${GT} gap:3px; align-items:center;\"><div><\u002Fdiv>`;\n    for(let dd=1;dd<=30;dd++) hdr+=`<div style=\"font-size:10px; color:#8c7f6a; text-align:center;\">${(dd%5===0||dd===1)?dd:\"\"}<\u002Fdiv>`;\n    hdr+=`<div style=\"font-size:10px; color:#b89a52; text-align:right; text-transform:uppercase; letter-spacing:.06em;\">итог<\u002Fdiv><\u002Fdiv>`;\n    hm.appendChild(mk(hdr));\n    const cells=[];\n    d.parts.forEach((p,ri)=>{\n      const row=mk(`<div style=\"display:grid; ${GT} gap:3px; align-items:center;\"><\u002Fdiv>`);\n      const nm=document.createElement(\"div\");\n      nm.style.cssText=\"font-size:12.5px; color:#cdbf9f; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:6px;\";\n      nm.textContent=p.name; row.appendChild(nm);\n      for(let i=0;i<30;i++){\n        const s=p.grid[i]; const c=document.createElement(\"div\");\n        c.style.cssText=`aspect-ratio:1; border-radius:3px; background:#241a22; transition:transform .1s, background .4s; transform:scale(0); transition-delay:${(ri*8+i)*4}ms; cursor:default;`;\n        c.dataset.fill=color(s,i+1); c.dataset.n=p.name; c.dataset.d=i+1; c.dataset.s=s;\n        c.addEventListener(\"mouseenter\",e=>{ c.style.transform=\"scale(1.5)\"; c.style.zIndex=5; c.style.outline=\"2px solid #fff\"; this._tip(e,p.name,i+1,s); });\n        c.addEventListener(\"mousemove\",e=>this._tip(e,p.name,i+1,s));\n        c.addEventListener(\"mouseleave\",()=>{ c.style.transform=\"scale(1)\"; c.style.zIndex=\"\"; c.style.outline=\"none\"; this._hideTip(); });\n        row.appendChild(c); cells.push(c);\n      }\n      const tot=document.createElement(\"div\");\n      tot.style.cssText=\"font-family:'Prata',serif; font-size:11.5px; color:#e6c266; text-align:right; white-space:nowrap; padding-left:4px;\";\n      tot.textContent=compact(p.sum); row.appendChild(tot);\n      hm.appendChild(row);\n    });\n    this._hmCells=cells; this._hmAnimated=false;\n    const fillHm=()=>{ if(this._hmAnimated) return; this._hmAnimated=true; cells.forEach(c=>{ c.style.background=c.dataset.fill; c.style.transform=\"scale(1)\"; }); setTimeout(()=>cells.forEach(c=>{ c.style.transition=\"none\"; c.style.transform=\"scale(1)\"; }),1500); };\n    const io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting){ fillHm(); io.disconnect(); } }); },{threshold:.06});\n    io.observe(hm);\n    const onScroll=()=>{ const r=hm.getBoundingClientRect(); if(r.top<innerHeight*0.9 && r.bottom>0){ fillHm(); window.removeEventListener(\"scroll\",onScroll); } };\n    window.addEventListener(\"scroll\",onScroll,{passive:true}); onScroll();\n  }\n\n  _tip(e,name,day,s){\n    let tip=this._tipEl;\n    if(!tip){ tip=document.createElement(\"div\"); tip.style.cssText=\"position:fixed; pointer-events:none; background:#0b0709; border:1px solid rgba(230,194,102,.4); border-radius:8px; padding:7px 10px; font-size:12.5px; color:#f2e9d6; z-index:80; white-space:nowrap; transition:opacity .1s;\"; document.body.appendChild(tip); this._tipEl=tip; }\n    const t=s?Math.floor(s/60)+\":\"+String(s%60).padStart(2,\"0\"):\"пропуск\";\n    tip.innerHTML=`<b style=\"color:#b6f05c;\">${name}<\u002Fb> · день ${day} · ${t}`;\n    tip.style.opacity=1; tip.style.left=Math.min(e.clientX+14,innerWidth-190)+\"px\"; tip.style.top=(e.clientY+16)+\"px\";\n  }\n  _hideTip(){ if(this._tipEl) this._tipEl.style.opacity=0; }\n\n  _buildSurvival(){\n    const box=this.refs.survival; if(!box) return;\n    const v=this.data().daily; const W=940,H=240,pad=34;\n    const max=Math.max(...v);\n    const x=i=>pad+i*(W-2*pad)/(v.length-1);\n    const y=val=>H-pad-(val/max)*(H-2*pad);\n    let line=\"\",area=\"M\"+x(0)+\" \"+(H-pad);\n    v.forEach((val,i)=>{ line+=(i?\"L\":\"M\")+x(i).toFixed(1)+\" \"+y(val).toFixed(1)+\" \"; area+=\"L\"+x(i).toFixed(1)+\" \"+y(val).toFixed(1)+\" \"; });\n    area+=\"L\"+x(v.length-1)+\" \"+(H-pad)+\"Z\";\n    let dots=\"\"; v.forEach((val,i)=>{ dots+=`<circle cx=\"${x(i).toFixed(1)}\" cy=\"${y(val).toFixed(1)}\" r=\"3\" fill=\"#b6f05c\" opacity=\"0\"><animate attributeName=\"opacity\" begin=\"${.6+i*.05}s\" dur=\"0.3s\" to=\"1\" fill=\"freeze\"/><\u002Fcircle>`; });\n    let gl=\"\"; [5,10,15,20].forEach(g=>{ gl+=`<line x1=\"${pad}\" x2=\"${W-pad}\" y1=\"${y(g)}\" y2=\"${y(g)}\" stroke=\"rgba(230,194,102,0.12)\"/><text x=\"${pad-8}\" y=\"${y(g)+4}\" fill=\"#8c7f6a\" font-size=\"11\" text-anchor=\"end\">${g}<\u002Ftext>`; });\n    let xl=\"\"; [1,5,10,15,20,25,30].forEach(dd=>{ xl+=`<text x=\"${x(dd-1)}\" y=\"${H-10}\" fill=\"#8c7f6a\" font-size=\"11\" text-anchor=\"middle\">${dd}<\u002Ftext>`; });\n    box.innerHTML=`<svg viewBox=\"0 0 ${W} ${H}\" style=\"width:100%; height:auto;\"><defs><linearGradient id=\"svg-g\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#b6f05c\" stop-opacity=\".32\"/><stop offset=\"1\" stop-color=\"#b6f05c\" stop-opacity=\"0\"/><\u002FlinearGradient><\u002Fdefs>${gl}<path id=\"sv-area\" d=\"${area}\" fill=\"url(#svg-g)\" opacity=\"0\"/><path id=\"sv-line\" d=\"${line}\" fill=\"none\" stroke=\"#b6f05c\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/>${dots}${xl}<\u002Fsvg>`;\n    const lineEl=box.querySelector(\"#sv-line\"); const areaEl=box.querySelector(\"#sv-area\");\n    const len=lineEl.getTotalLength(); lineEl.style.strokeDasharray=len; lineEl.style.strokeDashoffset=len; lineEl.style.transition=\"stroke-dashoffset 2s ease\";\n    let drawn=false;\n    const drawSv=()=>{ if(drawn) return; drawn=true; lineEl.style.strokeDashoffset=0; areaEl.style.transition=\"opacity 1.4s ease .5s\"; areaEl.style.opacity=1; setTimeout(()=>{ lineEl.style.transition=\"none\"; lineEl.style.strokeDashoffset=0; areaEl.style.opacity=1; },2300); };\n    const io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting){ drawSv(); io.disconnect(); } }); },{threshold:.12});\n    io.observe(box);\n    const onScroll=()=>{ const r=box.getBoundingClientRect(); if(r.top<innerHeight*0.85 && r.bottom>0){ drawSv(); window.removeEventListener(\"scroll\",onScroll); } };\n    window.addEventListener(\"scroll\",onScroll,{passive:true}); onScroll();\n  }\n\n  _wireReveals(){\n    const els=[...this.refs.root.querySelectorAll(\"[data-reveal]\")];\n    els.forEach(el=>{ el.style.opacity=0; el.style.transform=\"translateY(34px)\"; el.style.transition=\"opacity .8s ease, transform .8s cubic-bezier(.2,.7,.2,1)\"; });\n    const show=el=>{ if(el.dataset.shown) return; el.dataset.shown=\"1\"; el.style.opacity=1; el.style.transform=\"none\"; };\n    const io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting){ show(en.target); io.unobserve(en.target); } }); },{threshold:.12, rootMargin:\"0px 0px -6% 0px\"});\n    els.forEach(el=>io.observe(el));\n    const onScroll=()=>{ let remain=false; els.forEach(el=>{ if(el.dataset.shown) return; const r=el.getBoundingClientRect(); if(r.top<innerHeight*0.94 && r.bottom>0){ show(el); io.unobserve(el); } else remain=true; }); if(!remain) window.removeEventListener(\"scroll\",onScroll); };\n    window.addEventListener(\"scroll\",onScroll,{passive:true});\n    requestAnimationFrame(onScroll);\n    // абсолютный фолбэк: ничего не должно остаться невидимым\n    setTimeout(()=>els.forEach(el=>{ if(!el.dataset.shown){ const r=el.getBoundingClientRect(); if(r.top<innerHeight && r.bottom>0) show(el); } }),2500);\n  }\n\n  _wireCountups(){\n    const els=[...this.refs.root.querySelectorAll(\".kpi-num\")];\n    const run=el=>{ if(el.dataset.done) return; el.dataset.done=\"1\"; if(el.dataset.static){ el.textContent=el.dataset.static; return; } const to=+el.dataset.cu; let t0=null; const step=ts=>{ if(!t0)t0=ts; let p=Math.min((ts-t0)/1100,1); p=1-Math.pow(1-p,3); el.textContent=Math.round(to*p).toString(); if(p<1)requestAnimationFrame(step); else el.textContent=String(to); }; requestAnimationFrame(step);\n      // wall-clock safety: guarantee final value even if rAF clock is frozen\n      setTimeout(()=>{ el.textContent=el.dataset.static||String(to); },1300); };\n    const io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting){ run(en.target); io.unobserve(en.target); } }); },{threshold:.4});\n    els.forEach(el=>io.observe(el));\n    const onScroll=()=>{ let remain=false; els.forEach(el=>{ if(el.dataset.done) return; const r=el.getBoundingClientRect(); if(r.top<innerHeight*0.95 && r.bottom>0){ run(el); io.unobserve(el); } else remain=true; }); if(!remain) window.removeEventListener(\"scroll\",onScroll); };\n    window.addEventListener(\"scroll\",onScroll,{passive:true}); onScroll();\n    // absolute fallback: never leave a KPI showing its placeholder\n    setTimeout(()=>els.forEach(el=>{ if(!el.dataset.done) el.textContent=el.dataset.static||el.dataset.cu; }),2500);\n  }\n\n  _wirePodium(){\n    const podium=this.refs.podium;\n    const items=[...podium.querySelectorAll(\"[data-podium]\")];\n    let fired=false;\n    const fire=()=>{ if(fired) return; fired=true;\n      items.forEach(it=>{ const place=it.dataset.podium; const delay=place===\"1\"?0:(place===\"2\"?300:520);\n        setTimeout(()=>{\n          it.style.animation=\"podiumPop 1.2s cubic-bezier(.16,.86,.24,1) forwards\";\n          this._radiate(it, place);\n          setTimeout(()=>{ it.style.animation=\"none\"; it.style.opacity=\"1\"; it.style.transform=\"none\"; this._podiumGlow(it, place); },1300);\n        },delay);\n      });\n    };\n    const io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting){ fire(); io.disconnect(); } }); },{threshold:.08, rootMargin:\"0px 0px -8% 0px\"});\n    io.observe(podium);\n    // safety: if observer never fires (tall element / short viewport), force on scroll-near\n    const onScroll=()=>{ const r=podium.getBoundingClientRect(); if(r.top < innerHeight*0.85 && r.bottom > 0){ fire(); window.removeEventListener(\"scroll\",onScroll); } };\n    window.addEventListener(\"scroll\",onScroll,{passive: e=names.map(n=>`<span style=\"display:inline-block; border-bottom:1.5px dotted #9a988e; padding:0 6px 2px; margin:3px 4px; color:#6b6960; font-family:'PT Serif',serif; font-size:15.5px;\">${n}<\u002Fspan>`).join(\"\");\n    const inner=`\n      <div style=\"font-family:'Manrope',sans-serif; font-size:11px; letter-spacing:2px; color:#9a988e; text-transform:uppercase;\">Высокая коллегия стулостояния · отдел невыдающихся результатов<\u002Fdiv>\n      <div style=\"font-family:'Special Elite',monospace; font-size:42px; letter-spacing:2px; color:#6b6960; margin-top:30px;\">ДИПЛОМ УЧАСТНИКА<\u002Fdiv>\n      <div style=\"font-family:'PT Serif',serif; font-style:italic; font-size:15px; color:#9a988e; margin-top:8px;\">(один на всех. но всё-таки именной — мы старались)<\u002Fdiv>\n      <div data-icon=\"meh\" style=\"width:54px; height:54px; margin-top:22px; transform:rotate(-7deg);\"><\u002Fdiv>\n      <div style=\"font-family:'PT Serif',serif; font-size:16.5px; line-height:1.7; color:#6b6960; max-width:640px; margin-top:24px;\">Настоящим без особого энтузиазма, но с искренней теплотой удостоверяется, что ${run} — все они честно пытались сидеть в стульчике, однако дружно не дотянули и до половины челленджа.<\u002Fdiv>\n      <div style=\"font-family:'PT Serif',serif; font-size:16.5px; line-height:1.7; color:#6b6960; max-width:640px; margin-top:12px;\"><span style=\"font-style:italic;\">Достоявшими<\u002Fspan> никто из перечисленных не стал и финального видео не явил — но коллегия отмечает сам факт попытки. Без восторга, зато без претензий.<\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:12px; letter-spacing:1.5px; color:#9a988e; text-transform:uppercase; margin-top:30px;\">Подчеркните своё имя:<\u002Fdiv>\n      <div style=\"margin-top:12px; max-width:640px; line-height:2;\">${underline}<\u002Fdiv>\n      <div style=\"margin-top:auto; width:100%; display:flex; justify-content:space-between; align-items:flex-end;\"><div style=\"display:flex; flex-d  color:${ink}; max-width:620px; margin-top:18px;\">вступил в челлендж уже отцом новорождённого — и, недосыпая ночами, мужественно отсидел у стены <b style=\"color:${roseD};\">${f.sessions} раз<\u002Fb>, суммарно <b style=\"color:${roseD};\">${f.total}<\u002Fb>. На большее сил не нашлось, что в этих обстоятельствах совершенно понятно. Коллегия постановила: сама попытка между кормлениями достойна отдельного ордена.<\u002Fdiv>\n      <div style=\"margin-top:18px; display:flex; flex-direction:column; align-items:center;\"><div style=\"font-family:'Manrope',sans-serif; font-size:11px; letter-spacing:3px; color:${rose}; text-transform:uppercase;\">Почётная номинация<\u002Fdiv><div style=\"font-family:'Prata',serif; font-size:24px; color:${roseD}; margin-top:6px; max-width:560px; line-height:1.3;\">«${f.nomination}»<\u002Fdiv><\u002Fdiv>\n      <div style=\"margin-top:auto; display:flex; align-items:flex-start; justify-content:center; gap:48px;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center;\">${medal}<div style=\"font-family:'Manrope',sans-serif; font-size:10px; letter-spacing:2px; color:${rose}; text-transform:uppercase; margin-top:30px;\">Медаль «За стойкость<br>при бессоннице»<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; margin-top:18px; border:1px solid ${rose}; background:rgba(231,150,180,0.12);\"><div style=\"padding:8px 26px; display:flex; flex-direction:column; align-items:center;\"><div style=\"font-family:'Manrope',sans-serif; font-size:9px; letter-spacing:2px; color:${rose}; text-transform:uppercase;\">Подходов до пополнения<\u002Fdiv><div style=\"font-family:'Prata',serif; font-size:20px; color:${roseD}; margin-top:3px;\">${f.sessions}<\u002Fdiv><\u002Fdiv><div style=\"width:1px; background:${rose};\"><\u002Fdiv><div style=\"padding:8px 26px; display:flex; flex-direction:column; align-items:center;\"><div style=\"font-family:'Manrope',sans-serif; font-size:9px; letter-spacing:2px; color:${rose}; text-transform:uppercase;\">Высижено суммарно<\u002Fdiv><div style=\"font-family:'Prata',serif; font-size:20px; color:${roseD}; margin-top:3px;\">${f.total}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"font-family:'PT Serif',serif; font-style:italic; font-size:11px; line-height:1.4; color:#9a6f82; margin-top:10px; max-width:560px;\">* Действителен бессрочно. Срок сна предъявителя — величина отрицательная и восстановлению не подлежит.<\u002Fdiv>\n      <div style=\"width:100%; display:flex; justify-content:space-between; align-items:flex-end; margin-top:14px;\">\n        <div style=\"width:42%; display:flex; flex-direction:column; align-items:center;\"><div style=\"font-family:'Marck Script',cursive; font-size:27px; color:${ink}; line-height:1;\">Б. Усидчивый<\u002Fdiv><div style=\"width:100%; height:1px; background:${rose}; margin-top:4px;\"><\u002Fdiv><div style=\"font-family:'Manrope',sans-serif; font-size:10px; letter-spacing:1px; color:${roseD}; margin-top:6px; text-transform:uppercase;\">Главный седалищный комиссар<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:16%; display:flex; justify-content:center;\"><div style=\"position:relative; width:70px; height:70px; border-radius:50%; background:radial-gradient(circle at 38% 32%,#d96d92,#8e2f52 72%); box-shadow:inset 0 3px 8px rgba(0,0,0,0.4),0 0 14px rgba(231,150,180,0.5); display:flex; align-items:center; justify-content:center;\"><div style=\"position:absolute; inset:7px; border-radius:50%; border:1px dashed rgba(255,244,248,0.6);\"><\u002Fdiv><div style=\"font-family:'Prata',serif; font-size:22px; color:${cream};\">ВС<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"width:42%; display:flex; flex-direction:column; align-items:center;\"><div style=\"font-family:'Marck Script',cursive; font-size:27px; color:${ink}; line-height:1;\">В. Непоколебимый<\u002Fdiv><div style=\"width:100%; height:1px; background:${rose}; margin-top:4px;\"><\u002Fdiv><div style=\"font-family:'Manrope',sans-serif; font-size:10px; letter-spacing:1px; color:${roseD}; margin-top:6px; text-transform:uppercase;\">Хранитель стульчиков<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:100%; display:flex; justify-content:space-between; align-items:center; margin-top:12px; font-family:'Manrope',sans-serif; font-size:11px; letter-spacing:1px; color:#a87e90;\"><div>ОСОБЫЙ СЕРТИФИКАТ · О-01 / 2026<\u002Fdiv><div style=\"font-style:italic; font-family:'PT Serif',serif; color:${roseD};\">Спи, малыш. Папа заслужил.<\u002Fdiv><div>2026 г.<\u002Fdiv><\u002Fdiv>`;\n    return this._mk(`<div style=\"position:relative; width:794px; height:1123px; flex:none; overflow:hidden; color:${ink}; font-family:'PT Serif',Georgia,serif; background:radial-gradient(120% 84% at 50% -6%, #fff6f9 0%, #fbe6ee 52%, #f6d6e2 100%);\">${frame}<div style=\"position:absolute; inset:62px; display:flex; flex-direction:column; align-items:center; text-align:center;\">${inner}<\u002Fdiv><\u002Fdiv>`);\n  }\n  _babyIcon(size){\n    return `<svg viewBox=\"0 0 64 64\" width=\"${size}\" height=\"${size}\" fill=\"none\">\n      <circle cx=\"32\" cy=\"26\" r=\"15\" fill=\"#ffe8f0\" stroke=\"#f3b9cd\" stroke-width=\"1.5\"/>\n      <path d=\"M20 22 q-5 -10 7 -11\" stroke=\"#f3b9cd\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"/>\n      <circle cx=\"27\" cy=\"26\" r=\"2\" fill=\"#8e2f52\"/><circle cx=\"37\" cy=\"26\" r=\"2\" fill=\"#8e2f52\"/>\n      <path d=\"M27 32 q5 4 10 0\" stroke=\"#8e2f52\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\"/>\n      <circle cx=\"22\" cy=\"30\" r=\"2.5\" fill=\"#f7a8c2\" opacity=\"0.7\"/><circle cx=\"42\" cy=\"30\" r=\"2.5\" fill=\"#f7a8c2\" opacity=\"0.7\"/>\n      <path d=\"M22 41 q10 7 20 0 v6 q-10 7 -20 0 z\" fill=\"#ffe8f0\" stroke=\"#f3b9cd\" stroke-width=\"1.4\"/>\n      <path d=\"M50 44 l3 -3 m-3 3 a4 4 0 1 0 0 0.1\" stroke=\"#f3b9cd\" stroke-width=\"2.4\" fill=\"none\"/><\u002Fsvg>`;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
